<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shooter Web</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="gameCanvas" width="1280" height="720"></canvas>

      <div class="overlay">
        <button id="editToggle" class="edit-toggle" type="button" aria-label="Toggle edit mode">&#9998;</button>
        <header class="topbar">
          <div class="scoreboard">
            <div><span>HP</span><strong id="hpValue">100</strong></div>
            <div><span>Fuel</span><strong id="fuelValue">100%</strong></div>
            <div><span>Weapon</span><strong id="weaponValue">Rifle</strong></div>
            <div><span>Ammo</span><strong id="ammoValue">30</strong></div>
            <div><span>Grenades</span><strong id="grenadeValue">3</strong></div>
            <div><span>Kills</span><strong id="killsValue">0</strong></div>
          </div>
        </header>

        <aside class="panel">
          <section>
            <h2>Controls</h2>
            <ul>
              <li><kbd>A</kbd> <kbd>D</kbd> move</li>
              <li><kbd>W</kbd> jump</li>
              <li><kbd>Shift</kbd> sprint</li>
              <li><kbd>LMB</kbd> fire</li>
              <li><kbd>RMB</kbd> jetpack</li>
              <li><kbd>G</kbd> grenade</li>
              <li><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> weapons</li>
              <li><kbd>R</kbd> respawn</li>
            </ul>
          </section>
          <section>
            <h2>Status</h2>
            <p id="statusText">Enter the arena and hold the high ground.</p>
          </section>
          <section>
            <h2>Bots</h2>
            <label class="bot-control" for="botCountInput">
              <span>Bot count</span>
              <input id="botCountInput" type="range" min="0" max="10" step="1" value="6" />
              <strong id="botCountValue">6</strong>
            </label>
          </section>
        </aside>
      </div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
